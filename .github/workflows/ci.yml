name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        id: lint
        continue-on-error: true
        run: bun run lint -- --format json --output-file lint-report.json

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-final
          path: lint-report.json
          if-no-files-found: ignore

      - name: Run tests
        id: tests
        continue-on-error: true
        run: bun run test

      - name: Build production app
        id: build
        continue-on-error: true
        run: bun run build

      - name: Fail on verification errors
        if: steps.lint.outcome == 'failure' || steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          echo "lint=${{ steps.lint.outcome }} tests=${{ steps.tests.outcome }} build=${{ steps.build.outcome }}"
          exit 1
