name: Test report

on:
  push:
    branches: [improve-copy-ux-2026-07]
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - run: bun install --frozen-lockfile
      - name: Capture test output
        shell: bash
        run: |
          set +e
          bun run test > test-output.txt 2>&1
          echo $? > test-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            test-output.txt
            test-exit-code.txt
